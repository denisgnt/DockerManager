version: '3.8'

services:
  docker-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker-manager
    restart: unless-stopped
    ports:
      - "3011:5005"
    volumes:
      # Mount scripts directory
      - ${SCRIPTS_DIR}:/app/scripts:ro
    environment:
      # Docker API Configuration
      - VITE_DOCKER_API_HOST=${VITE_DOCKER_API_HOST:-10.174.18.242}
      - VITE_DOCKER_API_PORT=${VITE_DOCKER_API_PORT:-2375}
      # Server Port (в production только backend на 5005)
      - VITE_BACKEND_PORT=5005
      # Scripts Directory (internal path)
      - SCRIPTS_DIR=/app/scripts
      # Application Name
      - VITE_APP_NAME=${VITE_APP_NAME:-Docker Manager DEVELOP}
      # Force production mode
      - NODE_ENV=production
    networks:
      - docker-manager-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5005/api/containers"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  docker-manager-network:
    driver: bridge
